<title>CogScroll</title>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #E4E4E4; overflow: hidden; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* motion-led feedback language */
  @keyframes csPop { from { transform: scale(0.9); } 60% { transform: scale(1.03); } to { transform: scale(1); } }
  @keyframes csPopBig { 0% { transform: scale(0.86); } 55% { transform: scale(1.13); } to { transform: scale(1); } }
  @keyframes csRing { from { transform: scale(0.62); opacity: 0.85; } to { transform: scale(1.5); opacity: 0; } }
  @keyframes csRing2 { 0% { transform: scale(0.62); opacity: 0; } 30% { opacity: 0.5; } to { transform: scale(1.78); opacity: 0; } }
  @keyframes csShake {
    0%, 100% { transform: translateX(0); }
    14% { transform: translateX(-12px); }
    28% { transform: translateX(10px); }
    42% { transform: translateX(-8px); }
    57% { transform: translateX(6px); }
    71% { transform: translateX(-4px); }
    85% { transform: translateX(2px); }
  }
  @keyframes csGhostA { 0% { opacity: 0; transform: translate(0,0); } 35% { opacity: 0.4; } 100% { opacity: 0; transform: translate(-26px,-13px); } }
  @keyframes csGhostB { 0% { opacity: 0; transform: translate(0,0); } 35% { opacity: 0.4; } 100% { opacity: 0; transform: translate(26px,13px); } }
  @keyframes csFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes csDeplete { from { transform: scaleX(1); } to { transform: scaleX(0); } }
  @keyframes csPulse { from { transform: scale(0.82); opacity: 0.85; } to { transform: scale(1.62); opacity: 0; } }
  @keyframes csReveal { from { opacity: 0; transform: scale(0.82); } to { opacity: 1; transform: scale(1); } }
  @keyframes csSurgeR { 0% { transform: translateX(0); opacity: 1; } 60% { transform: translateX(50px); opacity: 0; } 100% { transform: translateX(50px); opacity: 0; } }
  @keyframes csSurgeL { 0% { transform: translateX(0); opacity: 1; } 60% { transform: translateX(-50px); opacity: 0; } 100% { transform: translateX(-50px); opacity: 0; } }
  .cs-shake { animation: csShake .5s ease-in-out; }
  .cs-surge-r { animation: csSurgeR .5s ease-in forwards; }
  .cs-surge-l { animation: csSurgeL .5s ease-in forwards; }
</style>
</head>

<div id="root"></div>
