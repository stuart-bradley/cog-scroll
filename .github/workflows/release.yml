name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'alpha'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: 'Release status'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-flutter

      - name: Setup Ruby
        uses: ruby/setup-ruby@a99ac844649df2596b52b4db087cfa0881b172af # v1.311.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: android

      # Verification runs WITHOUT the signing/Play secrets in scope, so
      # build_runner codegen and the test suite never see the keystore
      # passwords or the Play service-account key.
      - name: Verify
        run: just check

      - name: Sign, build, and deploy
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          PLAY_STORE_TRACK: ${{ inputs.track || 'alpha' }}
          # Default to a safe draft on tag pushes (matches the workflow_dispatch
          # input default and the Fastfile default); promote explicitly.
          PLAY_STORE_RELEASE_STATUS: ${{ inputs.release_status || 'draft' }}
        run: just release-ci
