name: cogscroll
description: "Brain-training in pure black & white — nine games, six cognitive domains, on-device only."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  drift: ^2.25.0
  drift_flutter: ^0.2.4
  # file_picker stays on 10.x: 11.x added an AGP-9-only build path requiring
  # android.builtInKotlin=true, which other plugins we use (share_plus,
  # package_info_plus) don't yet support. See android/gradle.properties.
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.1.0
  go_router: ^17.1.0
  in_app_purchase: ^3.2.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.0
  share_plus: ^12.0.1
  shared_preferences: ^2.3.0
  timezone: ^0.11.0

dev_dependencies:
  build_runner: ^2.4.15
  custom_lint: ^0.8.1
  drift_dev: ^2.25.0
  fake_async: ^1.3.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol_finders: ^2.3.2
  riverpod: ^3.0.0
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  fonts:
    - family: Space Grotesk
      fonts:
        # Variable font (OFL); Flutter maps FontWeight to the `wght` axis.
        - asset: assets/fonts/SpaceGrotesk-VariableFont_wght.ttf
